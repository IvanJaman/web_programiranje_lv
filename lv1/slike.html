                    CSS-only lightbox: svaka slika ima:
                    1. <a href="#slika-N"> koji aktivira :target na overlayu
                    2. overlay div s id="slika-N" koji se prikazuje samo kad je :target aktivan
                    3. <a href="#"> unutar overlaya služi kao "close" gumb
                -->

                <!-- Slika 1 -->
                <div class="magnific-img">

                    </a>

                </div>
